services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  invoice-tracker-keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: invoice-tracker-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 9090
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 9090
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
    ports:
      - "9090:9090"
    command:
      - start-dev
      - --http-port=9090
      - --import-realm
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infrastructure/keycloak-realm.json:/opt/keycloak/data/import/keycloak-realm.json
    networks:
      - microservices-network

  invoice-tracker-postgres:
    image: postgres:15-alpine
    container_name: invoice-tracker-keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-network

  invoice-tracker-authdb:
    image: postgres:15-alpine
    container_name: invoice-tracker-authdb-postgres
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - authdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - microservices-network

  invoice-tracker-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: invoice-tracker-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - microservices-network

  invoice-tracker-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: invoice-tracker-kafka
    depends_on:
      - invoice-tracker-zookeeper
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: invoice-tracker-zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093,PLAINTEXT_INTERNAL://invoice-tracker-kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - microservices-network

  invoice-tracker-minio:
    image: minio/minio:latest
    container_name: invoice-tracker-minio
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - microservices-network

  invoice-tracker-kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: invoice-tracker-kafka-ui
    depends_on:
      - invoice-tracker-kafka
      - invoice-tracker-zookeeper
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: invoice-tracker-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: invoice-tracker-kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: invoice-tracker-zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - microservices-network

  invoice-tracker-mailhog:
    image: mailhog/mailhog:latest
    container_name: invoice-tracker-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - microservices-network

  # ─── Application Services ──────────────────────────────────────────────────

  invoice-tracker-api:
    build:
      context: .
      dockerfile: apps/client/backend/InvoiceTrackerApi/Dockerfile
    container_name: invoice-tracker-api
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=invoice-tracker-authdb;Port=5432;Database=authdb;Username=postgres;Password=postgres"
      # Keycloak: use host.docker.internal so the OIDC discovery call reaches the
      # host-exposed Keycloak, which (with KC_HOSTNAME=localhost) returns tokens
      # and metadata that both the browser and containers agree on.
      Keycloak__Authority: "http://host.docker.internal:9090/realms/microservices"
      Kafka__BootstrapServers: "invoice-tracker-kafka:29092"
      PdfGeneratorService__Url: "http://pdf-generator-service:5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      invoice-tracker-authdb:
        condition: service_healthy
      invoice-tracker-kafka:
        condition: service_started
    restart: unless-stopped
    networks:
      - microservices-network

  pdf-generator-service:
    build:
      context: .
      dockerfile: apps/client/backend/PdfGeneratorService/Dockerfile
    container_name: pdf-generator-service
    ports:
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=invoice-tracker-authdb;Port=5432;Database=authdb;Username=postgres;Password=postgres"
      Kafka__BootstrapServers: "invoice-tracker-kafka:29092"
      MinIO__Endpoint: "invoice-tracker-minio:9000"
      MinIO__AccessKey: "minioadmin"
      MinIO__SecretKey: "minioadmin"
      MinIO__PublicEndpoint: "http://localhost:9002"
      PUPPETEER_EXECUTABLE_PATH: "/usr/bin/chromium"
    depends_on:
      invoice-tracker-authdb:
        condition: service_healthy
      invoice-tracker-kafka:
        condition: service_started
      invoice-tracker-minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/5001"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - microservices-network

  email-notification-service:
    build:
      context: .
      dockerfile: apps/client/backend/EmailNotificationService/Dockerfile
    container_name: email-notification-service
    ports:
      - "5003:5003"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=invoice-tracker-authdb;Port=5432;Database=authdb;Username=postgres;Password=postgres"
      Kafka__BootstrapServers: "invoice-tracker-kafka:29092"
      MinIO__Endpoint: "invoice-tracker-minio:9000"
      MinIO__AccessKey: "minioadmin"
      MinIO__SecretKey: "minioadmin"
      Smtp__Host: "invoice-tracker-mailhog"
      Smtp__Port: "1025"
      App__FrontendUrl: "http://localhost:5173"
    depends_on:
      invoice-tracker-authdb:
        condition: service_healthy
      invoice-tracker-kafka:
        condition: service_started
      invoice-tracker-minio:
        condition: service_started
      invoice-tracker-mailhog:
        condition: service_started
    restart: unless-stopped
    networks:
      - microservices-network

  management-api:
    build:
      context: .
      dockerfile: apps/management/backend/Dockerfile
    container_name: management-api
    ports:
      - "5002:5002"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=invoice-tracker-authdb;Port=5432;Database=authdb;Username=postgres;Password=postgres"
      Keycloak__Authority: "http://host.docker.internal:9090/realms/microservices"
      PdfGeneratorService__Url: "http://pdf-generator-service:5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      invoice-tracker-authdb:
        condition: service_healthy
      pdf-generator-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - microservices-network

  client-frontend:
    build:
      context: apps/client/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:5000"
    container_name: client-frontend
    ports:
      - "5173:80"
    networks:
      - microservices-network

  management-frontend:
    build:
      context: apps/management/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:5002"
    container_name: management-frontend
    ports:
      - "5174:80"
    networks:
      - microservices-network

volumes:
  keycloak_data:
  postgres_data:
  authdb_data:
  minio_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:

networks:
  microservices-network:
    driver: bridge
