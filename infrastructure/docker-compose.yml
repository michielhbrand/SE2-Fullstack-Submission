services:
  invoice-tracker-keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: invoice-tracker-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 9090
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
    ports:
      - "9090:9090"
    command:
      - start-dev
      - --http-port=9090
      - --import-realm
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-realm.json:/opt/keycloak/data/import/keycloak-realm.json
    networks:
      - microservices-network

  invoice-tracker-postgres:
    image: postgres:15-alpine
    container_name: invoice-tracker-keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-network

  invoice-tracker-appdb:
    image: postgres:15-alpine
    container_name: invoice-tracker-appdb-postgres
    environment:
      POSTGRES_DB: invoicetracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - appdb_data:/var/lib/postgresql/data
    networks:
      - microservices-network

  invoice-tracker-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: invoice-tracker-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - microservices-network

  invoice-tracker-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: invoice-tracker-kafka
    depends_on:
      - invoice-tracker-zookeeper
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: invoice-tracker-zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093,PLAINTEXT_INTERNAL://invoice-tracker-kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - microservices-network

  invoice-tracker-minio:
    image: minio/minio:latest
    container_name: invoice-tracker-minio
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - microservices-network

  invoice-tracker-kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: invoice-tracker-kafka-ui
    depends_on:
      - invoice-tracker-kafka
      - invoice-tracker-zookeeper
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: invoice-tracker-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: invoice-tracker-kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: invoice-tracker-zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - microservices-network

  invoice-tracker-mailhog:
    image: mailhog/mailhog:latest
    container_name: invoice-tracker-mailhog
    ports:
      - "1025:1025"   # SMTP port
      - "8025:8025"   # Web UI port
    networks:
      - microservices-network

volumes:
  keycloak_data:
  postgres_data:
  appdb_data:
  minio_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:

networks:
  microservices-network:
    driver: bridge
