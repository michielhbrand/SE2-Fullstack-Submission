name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: .NET Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: |
          dotnet restore apps/management/backend/ManagementApi.Tests/ManagementApi.Tests.csproj
          dotnet restore apps/client/backend/InvoiceTrackerApi.Tests/InvoiceTrackerApi.Tests.csproj
          dotnet restore apps/client/backend/PdfGeneratorService.Tests/PdfGeneratorService.Tests.csproj
          dotnet restore apps/client/backend/EmailNotificationService.Tests/EmailNotificationService.Tests.csproj

      - name: Run ManagementApi tests
        run: |
          dotnet test apps/management/backend/ManagementApi.Tests/ManagementApi.Tests.csproj \
            --no-restore \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults/ManagementApi \
            --logger "trx;LogFileName=management-results.trx"

      - name: Run InvoiceTrackerApi tests
        run: |
          dotnet test apps/client/backend/InvoiceTrackerApi.Tests/InvoiceTrackerApi.Tests.csproj \
            --no-restore \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults/InvoiceTrackerApi \
            --logger "trx;LogFileName=invoicetracker-results.trx"

      - name: Run PdfGeneratorService tests
        run: |
          dotnet test apps/client/backend/PdfGeneratorService.Tests/PdfGeneratorService.Tests.csproj \
            --no-restore \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults/PdfGeneratorService \
            --logger "trx;LogFileName=pdfgenerator-results.trx"

      - name: Run EmailNotificationService tests
        run: |
          dotnet test apps/client/backend/EmailNotificationService.Tests/EmailNotificationService.Tests.csproj \
            --no-restore \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults/EmailNotificationService \
            --logger "trx;LogFileName=emailnotification-results.trx"

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./CoverageReport" \
            -reporttypes:"Html;MarkdownSummaryGithub;Cobertura" \
            -title:"SE2 Test Coverage"

      - name: Write coverage summary to job summary
        run: |
          if [ -f ./CoverageReport/SummaryGithub.md ]; then
            cat ./CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./CoverageReport/
          retention-days: 14

  frontend-checks:
    name: Frontend Type Check & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/client/frontend/package-lock.json

      - name: Install dependencies
        working-directory: apps/client/frontend
        run: npm ci

      - name: Type check & build
        working-directory: apps/client/frontend
        run: npm run build

      - name: Unit tests
        working-directory: apps/client/frontend
        run: npm run test
