name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: .NET Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run ManagementApi tests
        run: dotnet test apps/management/backend/ManagementApi.Tests/ManagementApi.Tests.csproj --no-restore --logger "trx;LogFileName=management-test-results.trx"

      - name: Run InvoiceTrackerApi tests
        run: dotnet test apps/client/backend/InvoiceTrackerApi.Tests/InvoiceTrackerApi.Tests.csproj --no-restore --logger "trx;LogFileName=invoicetracker-test-results.trx"

  frontend-checks:
    name: Frontend Type Check & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/client/frontend/package-lock.json

      - name: Install dependencies
        working-directory: apps/client/frontend
        run: npm ci

      - name: Type check & build
        working-directory: apps/client/frontend
        run: npm run build

      - name: Unit tests
        working-directory: apps/client/frontend
        run: npm run test
